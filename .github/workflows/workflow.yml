#Workflow CI/CD
#Descripcion: Construye imagen docker y la publica como artefacto a traves de GHCR.IO en el repositorio.
name: FastApi ml model CI/CD
run-name: Creando artefacto (Imagen Docker) en GHCR 
on: [push]

env: 
    REGISTRY: ghcr.io
    IMAGE_NAME: themidnightguy/api_taller

jobs:
    #JOB-N1 - Build y push imagen a GHCR
    Build-Push-GHCR:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
        #checkout
        - name: Chequeo de código
          uses: actions/checkout@v4
        #login ghcr (GitHub Container Registry)
        - name: login GHCR
          uses: docker/login-action@v3
          with:
            registry: ${{env.REGISTRY}}
            username: ${{github.actor}}
            password: ${{secrets.GITHUB_TOKEN}}

        #build-push-actions
        - name: Build & Push Docker image
          uses: docker/build-push-action@v6
          with: 
            push: true
            tags: ${{env.REGISTRY}}/${{env.IMAGE_NAME}}/api_taller_app:latest
            secrets: |
                GIT_AUTH_TOKEN=${{secrets.GITHUB_TOKEN}}